<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | STACKLY</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
    
    <style>
        .error-section {
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 150px 20px 100px;
            background: linear-gradient(135deg, var(--light-bg), var(--white));
            position: relative;
            overflow: hidden;
        }
        
        .error-content {
            position: relative;
            z-index: 10;
            max-width: 600px;
        }
        
        .error-code {
            font-size: 150px;
            font-weight: 800;
            line-height: 1;
            color: var(--primary-green);
            margin-bottom: 20px;
            text-shadow: 0 20px 40px rgba(140, 198, 63, 0.2);
            font-family: var(--font-heading);
        }
        
        .error-title {
            font-size: 36px;
            font-weight: 700;
            color: var(--dark-text);
            margin-bottom: 20px;
        }
        
        .error-desc {
            font-size: 18px;
            color: var(--body-text);
            margin-bottom: 40px;
            line-height: 1.6;
        }
        
        .error-actions {
            display: flex;
            gap: 20px;
            justify-content: center;
        }
        
        .error-bg-icon {
            position: absolute;
            font-size: 400px;
            color: rgba(140, 198, 63, 0.05);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            pointer-events: none;
            animation: errorIconFloat 6s ease-in-out infinite;
        }

        @keyframes errorIconFloat {
            0% { transform: translate(-50%, -50%) rotate(0deg) scale(1); }
            50% { transform: translate(-50%, -55%) rotate(5deg) scale(1.05); color: rgba(140, 198, 63, 0.08); }
            100% { transform: translate(-50%, -50%) rotate(0deg) scale(1); }
        }
        
        @media (max-width: 768px) {
            .error-code { font-size: 100px; }
            .error-title { font-size: 28px; }
            .error-actions { flex-direction: column; }
            .error-bg-icon { font-size: 250px; }
        }
    </style>
</head>
<body>

    <!-- Premium Header -->
    
    <!-- Mobile Nav -->
    <div class="mobile-nav">
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="blog.html">Blog</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="login.html" class="mobile-login-btn">Login</a></li>
        </ul>
        <button class="mobile-close-btn"><i class="fa-solid fa-xmark"></i></button>
    </div>

    <main>
        <section class="error-section">
            <i class="fa-solid fa-plug-circle-xmark error-bg-icon"></i>
            <div class="error-content">
                <h1 class="error-code">404</h1>
                <h2 class="error-title">Lost Connection to the Grid</h2>
                <p class="error-desc">It looks like the page you're searching for has been disconnected or moved. Let's get you plugged back into the right energy source.</p>
                <div class="error-actions">
                    <button onclick="history.back()" class="btn btn-outline">Go Back</button>
                    <a href="index.html" class="btn btn-primary">Return Home</a>
                </div>
            </div>
        </section>
    </main>

    
    <!-- JS -->
    <script src="main.js"></script>
</body>
</html>
